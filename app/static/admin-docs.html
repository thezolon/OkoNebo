<!DOCTYPE html>
<html lang="en" class="admin-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkoNebo - Admin Documentation</title>
    <link rel="icon" type="image/svg+xml" href="okonebo-icon.svg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .docs-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 16px;
        }
        .docs-list {
            max-height: 72vh;
            overflow: auto;
            border: 1px solid rgba(125, 211, 252, 0.2);
            border-radius: 8px;
            padding: 8px;
            background: rgba(255,255,255,0.03);
        }
        .docs-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px;
            margin: 0 0 6px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(255,255,255,0.04);
            color: inherit;
            cursor: pointer;
        }
        .docs-item.active {
            border-color: rgba(125, 211, 252, 0.8);
            background: rgba(125, 211, 252, 0.15);
        }
        .docs-path {
            color: #9ca3af;
            font-size: 0.85em;
            margin-top: 4px;
        }
        .docs-content {
            border: 1px solid rgba(125, 211, 252, 0.2);
            border-radius: 8px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            max-height: 72vh;
            overflow: auto;
        }
        .docs-markdown {
            line-height: 1.5;
            font-size: 0.95rem;
            margin: 0;
        }
        .docs-markdown h1,
        .docs-markdown h2,
        .docs-markdown h3 {
            margin: 0.9em 0 0.4em;
        }
        .docs-markdown p,
        .docs-markdown ul,
        .docs-markdown ol,
        .docs-markdown table,
        .docs-markdown pre {
            margin: 0.6em 0;
        }
        .docs-markdown code {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 1px 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
            font-size: 0.9em;
        }
        .docs-markdown pre {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(125, 211, 252, 0.2);
            border-radius: 6px;
            padding: 10px;
            overflow: auto;
        }
        .docs-markdown pre code {
            background: transparent;
            border: 0;
            padding: 0;
            font-size: 0.88rem;
        }
        .docs-markdown table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .docs-markdown th,
        .docs-markdown td {
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 8px;
            text-align: left;
            vertical-align: top;
        }
        .docs-markdown th {
            background: rgba(125, 211, 252, 0.12);
        }
        .docs-markdown a {
            color: #7dd3fc;
            text-decoration: underline;
        }
        @media (max-width: 900px) {
            .docs-layout {
                grid-template-columns: 1fr;
            }
            .docs-list,
            .docs-content {
                max-height: none;
            }
        }
    </style>
</head>
<body class="admin-page">
    <div class="app-shell" style="grid-template-columns: 1fr; max-width: 1300px; margin: 0 auto;">
        <main class="main-col" style="padding: 16px;">
            <div class="panel-sec" style="margin-bottom: 16px;">
                <div class="panel-sec-hdr">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <img src="okonebo-icon.svg" alt="OkoNebo" width="28" height="28" style="border-radius: 6px;" />
                        <h2>Admin Documentation</h2>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <a href="/admin.html" class="map-btn" style="text-decoration:none;">Back to Admin</a>
                        <a href="/" class="map-btn" style="text-decoration:none;">Dashboard</a>
                    </div>
                </div>
                <div id="docs-status" class="setup-status">Loading document index...</div>
            </div>

            <div class="docs-layout">
                <section class="docs-list" id="docs-list"></section>
                <section class="docs-content">
                    <h3 id="doc-title" style="margin-top:0;">Select a document</h3>
                    <div id="doc-path" class="docs-path"></div>
                    <div id="doc-content" class="docs-markdown"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const AUTH_TOKEN_STORAGE_KEY = 'weatherapp.auth.token';

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderInline(text) {
            let html = escapeHtml(text);
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
                const safeUrl = escapeHtml(url);
                const safeLabel = escapeHtml(label);
                return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeLabel}</a>`;
            });
            return html;
        }

        function renderMarkdownTable(lines) {
            if (lines.length < 2) return null;
            const hasPipe = lines.every((line) => line.includes('|'));
            if (!hasPipe) return null;
            const rows = lines.map((line) => line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map((c) => c.trim()));
            const sep = rows[1] || [];
            const isSep = sep.length > 0 && sep.every((cell) => /^:?-{3,}:?$/.test(cell));
            if (!isSep) return null;

            const headers = rows[0] || [];
            const bodyRows = rows.slice(2);
            const th = headers.map((h) => `<th>${renderInline(h)}</th>`).join('');
            const trs = bodyRows
                .map((row) => `<tr>${row.map((c) => `<td>${renderInline(c)}</td>`).join('')}</tr>`)
                .join('');
            return `<table><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`;
        }

        function renderMarkdown(md) {
            const lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
            const out = [];
            let i = 0;
            let inCode = false;
            let codeLines = [];

            while (i < lines.length) {
                const line = lines[i];
                const trimmed = line.trim();

                if (trimmed.startsWith('```')) {
                    if (inCode) {
                        out.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
                        codeLines = [];
                        inCode = false;
                    } else {
                        inCode = true;
                    }
                    i += 1;
                    continue;
                }

                if (inCode) {
                    codeLines.push(line);
                    i += 1;
                    continue;
                }

                if (!trimmed) {
                    i += 1;
                    continue;
                }

                if (trimmed === '---') {
                    out.push('<hr>');
                    i += 1;
                    continue;
                }

                if (/^#{1,3}\s+/.test(trimmed)) {
                    const hashes = trimmed.match(/^#+/)[0].length;
                    const level = Math.min(3, hashes);
                    const content = trimmed.replace(/^#{1,3}\s+/, '');
                    out.push(`<h${level}>${renderInline(content)}</h${level}>`);
                    i += 1;
                    continue;
                }

                const tableChunk = [];
                let t = i;
                while (t < lines.length && lines[t].trim() && lines[t].includes('|')) {
                    tableChunk.push(lines[t]);
                    t += 1;
                }
                const renderedTable = renderMarkdownTable(tableChunk);
                if (renderedTable) {
                    out.push(renderedTable);
                    i = t;
                    continue;
                }

                if (/^[-*]\s+/.test(trimmed)) {
                    const items = [];
                    while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
                        items.push(lines[i].trim().replace(/^[-*]\s+/, ''));
                        i += 1;
                    }
                    out.push(`<ul>${items.map((item) => `<li>${renderInline(item)}</li>`).join('')}</ul>`);
                    continue;
                }

                if (/^\d+\.\s+/.test(trimmed)) {
                    const items = [];
                    while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
                        items.push(lines[i].trim().replace(/^\d+\.\s+/, ''));
                        i += 1;
                    }
                    out.push(`<ol>${items.map((item) => `<li>${renderInline(item)}</li>`).join('')}</ol>`);
                    continue;
                }

                const paraLines = [trimmed];
                i += 1;
                while (i < lines.length) {
                    const peek = lines[i].trim();
                    if (!peek || peek.startsWith('#') || peek.startsWith('```') || /^[-*]\s+/.test(peek) || /^\d+\.\s+/.test(peek) || peek === '---') {
                        break;
                    }
                    paraLines.push(peek);
                    i += 1;
                }
                out.push(`<p>${renderInline(paraLines.join(' '))}</p>`);
            }

            if (inCode) {
                out.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
            }

            return out.join('');
        }

        function getToken() {
            try {
                return window.localStorage.getItem(AUTH_TOKEN_STORAGE_KEY) || '';
            } catch (_) {
                return '';
            }
        }

        async function apiGet(path) {
            const headers = {};
            const token = getToken();
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(path, { headers });
            const body = await res.json().catch(() => ({}));
            if (!res.ok) {
                const detail = body && body.detail ? String(body.detail) : `${res.status} ${res.statusText}`;
                throw new Error(detail);
            }
            return body;
        }

        function setStatus(msg, tone = 'warn') {
            const el = document.getElementById('docs-status');
            if (!el) return;
            el.className = `setup-status ${tone}`;
            el.textContent = msg;
        }

        async function loadDoc(path, buttonEl) {
            try {
                const data = await apiGet(`/api/admin/docs/${encodeURIComponent(path).replace(/%2F/g, '/')}`);
                const titleEl = document.getElementById('doc-title');
                const pathEl = document.getElementById('doc-path');
                const contentEl = document.getElementById('doc-content');
                if (titleEl) titleEl.textContent = data.title || path;
                if (pathEl) pathEl.textContent = data.path || path;
                if (contentEl) contentEl.innerHTML = renderMarkdown(String(data.content || ''));

                document.querySelectorAll('.docs-item').forEach((btn) => btn.classList.remove('active'));
                if (buttonEl) buttonEl.classList.add('active');
                setStatus('Admin documentation loaded.', 'ok');
            } catch (err) {
                setStatus(`Unable to load document: ${err.message}`, 'err');
            }
        }

        async function loadIndex() {
            try {
                const data = await apiGet('/api/admin/docs');
                const list = Array.isArray(data.documents) ? data.documents : [];
                const listEl = document.getElementById('docs-list');
                if (!listEl) return;
                listEl.innerHTML = '';

                if (list.length === 0) {
                    setStatus('No admin-viewable documents found.', 'warn');
                    return;
                }

                list.forEach((doc) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'docs-item';
                    btn.innerHTML = `<strong>${doc.title || doc.path}</strong><div class="docs-path">${doc.path}</div>`;
                    btn.addEventListener('click', () => loadDoc(doc.path, btn));
                    listEl.appendChild(btn);
                });

                setStatus(`Loaded ${list.length} documents.`, 'ok');
                const firstButton = listEl.querySelector('.docs-item');
                if (firstButton && list[0]) {
                    await loadDoc(list[0].path, firstButton);
                }
            } catch (err) {
                setStatus(`Unable to load admin docs index: ${err.message}`, 'err');
            }
        }

        loadIndex();
    </script>
</body>
</html>
