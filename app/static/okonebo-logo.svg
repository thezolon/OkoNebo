<svg viewBox="0 0 400 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .okonebo-text { font-family: Arial, sans-serif; font-size: 48px; font-weight: bold; letter-spacing: 2px; }
      .weather-icon { fill: #1a1a1a; }
      .hexagon-bg { fill: #f5f5f5; }
      .grid-line { stroke: #cccccc; stroke-width: 1; }
      .azimuth-text { font-family: Arial, sans-serif; font-size: 14px; fill: #1a1a1a; text-anchor: middle; }
    </style>
  </defs>

  <!-- Polar grid background -->
  <g id="polar-grid">
    <!-- Concentric circles (distance rings) -->
    <circle cx="200" cy="180" r="30" class="grid-line" fill="none"/>
    <circle cx="200" cy="180" r="60" class="grid-line" fill="none"/>
    <circle cx="200" cy="180" r="90" class="grid-line" fill="none"/>
    <circle cx="200" cy="180" r="120" class="grid-line" fill="none"/>
    
    <!-- Radial lines (azimuth) -->
    <line x1="200" y1="180" x2="200" y2="60" class="grid-line"/>
    <line x1="200" y1="180" x2="265" y2="65" class="grid-line"/>
    <line x1="200" y1="180" x2="307" y2="107" class="grid-line"/>
    <line x1="200" y1="180" x2="320" y2="180" class="grid-line"/>
    <line x1="200" y1="180" x2="307" y2="253" class="grid-line"/>
    <line x1="200" y1="180" x2="265" y2="295" class="grid-line"/>
    <line x1="200" y1="180" x2="200" y2="300" class="grid-line"/>
    <line x1="200" y1="180" x2="135" y2="295" class="grid-line"/>
    <line x1="200" y1="180" x2="93" y2="253" class="grid-line"/>
    <line x1="200" y1="180" x2="80" y2="180" class="grid-line"/>
    <line x1="200" y1="180" x2="93" y2="107" class="grid-line"/>
    <line x1="200" y1="180" x2="135" y2="65" class="grid-line"/>
  </g>

  <!-- Azimuth labels -->
  <text x="200" y="45" class="azimuth-text">AZIMUTH</text>
  <text x="285" y="25" class="azimuth-text" font-size="12">100</text>
  <text x="340" y="50" class="azimuth-text" font-size="12">150</text>
  <text x="360" y="185" class="azimuth-text" font-size="12">150</text>
  <text x="340" y="310" class="azimuth-text" font-size="12">280</text>
  <text x="200" y="330" class="azimuth-text" font-size="12">270</text>
  <text x="60" y="310" class="azimuth-text" font-size="12">240</text>
  <text x="40" y="185" class="azimuth-text" font-size="12">300</text>
  <text x="60" y="50" class="azimuth-text" font-size="12">450</text>

  <!-- Weather icons in hexagons -->
  <g id="weather-icons">
    <!-- Top-right: Sun -->
    <g transform="translate(265, 90)">
      <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" class="hexagon-bg" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" class="weather-icon"/>
      <circle cx="-10" cy="-10" r="2" class="weather-icon"/>
      <circle cx="10" cy="-10" r="2" class="weather-icon"/>
      <circle cx="14" cy="0" r="2" class="weather-icon"/>
      <circle cx="10" cy="10" r="2" class="weather-icon"/>
      <circle cx="-10" cy="10" r="2" class="weather-icon"/>
      <circle cx="-14" cy="0" r="2" class="weather-icon"/>
    </g>

    <!-- Right: Hexagon (generic) -->
    <g transform="translate(320, 140)">
      <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" class="hexagon-bg" stroke="#1a1a1a" stroke-width="2" fill="#1a1a1a"/>
    </g>

    <!-- Bottom-right: Cloud/Rain -->
    <g transform="translate(265, 210)">
      <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" class="hexagon-bg" stroke="#1a1a1a" stroke-width="2"/>
      <path d="M -8,-5 Q -12,-10 -8,-15 Q -2,-18 2,-15 Q 8,-18 10,-12 Q 14,-15 14,-8 Q 10,-5 6,-4 L -8,-4" class="weather-icon"/>
      <line x1="-6" y1="5" x2="-4" y2="12" class="weather-icon" stroke-width="1.5"/>
      <line x1="0" y1="5" x2="2" y2="12" class="weather-icon" stroke-width="1.5"/>
      <line x1="6" y1="5" x2="8" y2="12" class="weather-icon" stroke-width="1.5"/>
    </g>

    <!-- Center: Main compass circle with crosshairs -->
    <g transform="translate(200, 180)">
      <circle cx="0" cy="0" r="15" class="weather-icon" opacity="0.8"/>
      <circle cx="0" cy="0" r="10" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="3" class="weather-icon"/>
      <!-- Crosshairs -->
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#1a1a1a" stroke-width="2"/>
      <path d="M 0,-10 L 3,-6 L 0,-2 L -3,-6 Z" class="weather-icon"/>
    </g>

    <!-- Bottom-left: Sun -->
    <g transform="translate(135, 210)">
      <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" class="hexagon-bg" stroke="#1a1a1a" stroke-width="2"/>
      <circle cx="0" cy="0" r="6" class="weather-icon"/>
      <circle cx="-10" cy="-10" r="2" class="weather-icon"/>
      <circle cx="10" cy="-10" r="2" class="weather-icon"/>
      <circle cx="14" cy="0" r="2" class="weather-icon"/>
      <circle cx="10" cy="10" r="2" class="weather-icon"/>
      <circle cx="-10" cy="10" r="2" class="weather-icon"/>
      <circle cx="-14" cy="0" r="2" class="weather-icon"/>
    </g>

    <!-- Left: Hexagon (generic) -->
    <g transform="translate(80, 140)">
      <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" class="hexagon-bg" stroke="#1a1a1a" stroke-width="2" fill="#1a1a1a"/>
    </g>

    <!-- Top-left: Cloud/Rain -->
    <g transform="translate(135, 90)">
      <polygon points="0,-20 17.3,-10 17.3,10 0,20 -17.3,10 -17.3,-10" class="hexagon-bg" stroke="#1a1a1a" stroke-width="2"/>
      <path d="M -8,-5 Q -12,-10 -8,-15 Q -2,-18 2,-15 Q 8,-18 10,-12 Q 14,-15 14,-8 Q 10,-5 6,-4 L -8,-4" class="weather-icon"/>
      <line x1="-6" y1="5" x2="-4" y2="12" class="weather-icon" stroke-width="1.5"/>
      <line x1="0" y1="5" x2="2" y2="12" class="weather-icon" stroke-width="1.5"/>
      <line x1="6" y1="5" x2="8" y2="12" class="weather-icon" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Text: OKONEBO -->
  <text x="200" y="415" text-anchor="middle" class="okonebo-text" fill="#1a1a1a">OKONEBO</text>
</svg>