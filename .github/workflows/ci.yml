name: CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main", "release/**"]

jobs:
  scripts-cross-platform:
    name: Script Sanity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Validate shell scripts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          bash -n start.sh
          bash -n health-check.sh
          bash -n scripts/reset.sh
          bash -n scripts/checksums.sh

      - name: Validate PowerShell scripts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $errors = @()
          [void][System.Management.Automation.Language.Parser]::ParseFile('health-check.ps1', [ref]$null, [ref]$errors)
          [void][System.Management.Automation.Language.Parser]::ParseFile('reset.ps1', [ref]$null, [ref]$errors)
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host $_ }
            throw "PowerShell parse errors found"
          }

      - name: Validate batch script (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call start.bat --check

  test:
    name: Lint, Test & Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: scripts-cross-platform

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile app/main.py app/weather_client.py
          for f in scripts/*.py; do python -m py_compile "$f"; done

      - name: Unit tests
        run: python -m unittest -v tests/test_provider_fallback.py tests/test_setup_auth_integration.py

      - name: Secret leak scan
        run: python scripts/security_check.py

  docker:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t weatherapp-ci:${{ github.sha }} .

      - name: Start container
        run: |
          docker run -d \
            --name weatherapp-ci \
            -p 8000:8000 \
            -e WEATHERAPP_LAT=36.1539 \
            -e WEATHERAPP_LON=-95.9928 \
            weatherapp-ci:${{ github.sha }}

      - name: Wait for health
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/api/config > /dev/null; then
              echo "Health check passed on attempt $i"
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Health check failed after 10 attempts"
              docker logs weatherapp-ci
              exit 1
            fi
            sleep 3
          done

      - name: Integration smoke tests
        env:
          WEATHERAPP_BASE_URL: "http://localhost:8000"
        run: |
          pip install httpx
          python tests/integration_smoke.py

      - name: Cleanup
        if: always()
        run: docker rm -f weatherapp-ci || true
